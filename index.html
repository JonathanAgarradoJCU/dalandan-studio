<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalandan Studio</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #ffecb8; /* 👈 CHANGES THE BACKGROUND COLOR */
            color: #000000;            /* 👈 CHANGES THE TEXT COLOR FOR READABILITY */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo a {
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }
        .nav-links a {
            color: #18bbcd;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: #ffae4a;
            font-weight: bold;
        }

        /* Main Content Area (Updated for perfect centering) */
        .main-content {
            flex: 1;
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .main-content h1 {
            font-size: 2.5rem;
            font-family: Arial, sans-serif;
            font-style: italic;
        }

        /* Barless Footer */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            font-size: 0.9rem;
            color: #565656; /* 👈 LIGHTENED FOR DARK BACKGROUND */
            background-color: transparent;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            .nav-links {
                flex-direction: column;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-logo">
            <a href="#">DalanDan Studio</a>
        </div>
        <ul class="nav-links">
            <li><a href="#contact-me">Contact Me</a></li>
            <li><a href="#about-me">About Me</a></li>
        </ul>
    </nav>

    <!-- Main Content Area (Added class "main-content") -->
    <main class="main-content">
        <h1>Dalandan Studio is coming soon! 🍊</h1>
    </main>

    <!-- Barless Footer (Added class "footer") -->
    <footer class="footer">
        <p id="copyright">&copy; 2026 DalanDan. All rights reserved.</p>
    </footer>

    <script src="footer_current_year.js"></script>
</body>
</html>
