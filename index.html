<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalandan Studio</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #ffecb8; 
            color: #000000;            
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ↴ UTILITY CLASS TO BLOCK JUMPING ANIMATIONS DURING WINDOW RESIZE */
        .resize-animation-stopper * {
            transition: none !important;
            animation: none !important;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo a {
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }
        .nav-links a {
            color: #18bbcd;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: #ffae4a;
            font-weight: bold;
        }

        /* Mobile Menu Toggle Button */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 110;
            width: 30px;
            text-align: center;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .main-content h1 {
            font-size: 2.5rem;
            font-family: Arial, sans-serif;
            font-style: italic;
        }

        /* Barless Footer */
        .footer {
            text-align: center;
            padding: 2rem 1rem;
            font-size: 0.9rem;
            color: #565656; 
            background-color: transparent;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
                position: absolute;
                top: 100%; 
                left: 0;
                width: 100%;
                background-color: #1a1a1a;
                padding: 2rem 0;
                text-align: center;
                
                /* Slide Animation Logic */
                transform: translateY(-150%); 
                transition: transform 0.4s ease-in-out;
                z-index: 90;
                box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            }

            .nav-links.active {
                transform: translateY(0); 
            }
        }

        @media (min-width: 769px) {
            .nav-links {
                transform: none !important; 
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-logo">
            <a href="#">DalanDan Studio</a>
        </div>
        
        <!-- Mobile Menu Toggle Button (☰ / ✕) -->
        <button class="menu-toggle" id="menuBtn" aria-label="Toggle navigation">☰</button>

        <ul class="nav-links" id="navLinks">
            <li><a href="#contact-me">Contact Me</a></li>
            <li><a href="#about-me">About Me</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <h1>Dalandan Studio is coming soon! 🍊</h1>
    </main>

    <!-- Barless Footer -->
    <footer class="footer">
        <p id="copyright">&copy; 2026 DalanDan. All rights reserved.</p>
    </footer>

    <!-- Mobile Menu and Window Resize Script -->
    <script>
        const menuBtn = document.getElementById('menuBtn');
        const navLinks = document.getElementById('navLinks');

        // 1. Toggle mobile menu on click
        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            if (navLinks.classList.contains('active')) {
                menuBtn.textContent = '✕';
            } else {
                menuBtn.textContent = '☰';
            }
        });

        // 2. Automatically close menu when clicking links
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                menuBtn.textContent = '☰';
            });
        });

        // 3. FIX: Stop animations from running while stretching/shrinking the window
        let resizeTimer;
        window.addEventListener('resize', () => {
            document.body.classList.add('resize-animation-stopper');
            
            // Clear previous timers to catch continuous dragging
            clearTimeout(resizeTimer);
            
            // Wait 100 milliseconds after resizing stops before allowing animations again
            resizeTimer = setTimeout(() => {
                document.body.classList.remove('resize-animation-stopper');
            }, 100);
        });
    </script>
    <script src="footer_current_year.js"></script>
</body>
</html>
